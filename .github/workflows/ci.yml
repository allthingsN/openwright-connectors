name: ci

on:
  push:
    branches-ignore: [badges]   # 'badges' holds only the generated coverage SVG
  pull_request:

permissions:
  contents: read   # least privilege; the coverage-badge job opts into write below

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check .

  # REPO-3: every connector tested against the MIN and LATEST supported core.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - openwright-langgraph
          - openwright-langfuse
          - openwright-postgres
          - openwright-s3
          - openwright-github-action
          - openwright-openai-agents
          - _template
        core: ["==0.6.0", ">=0.6,<0.8"]  # min and latest of the supported range
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install core (${{ matrix.core }}), conformance harness, and the package
        run: |
          python -m pip install --upgrade pip
          pip install "openwright-core${{ matrix.core }}"
          pip install ./conformance
          pip install "./packages/${{ matrix.package }}[test]"
      - name: Conformance + package tests
        run: pytest "packages/${{ matrix.package }}/tests" -q

  # REPO-4: decoupling guard — a connector must not import another connector.
  decoupling-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: |
          python -m pip install --upgrade pip
          pip install "openwright-core>=0.6,<0.8" import-linter ./conformance
          for p in packages/*; do pip install "$p"; done  # includes _template (openwright_template)
      - run: lint-imports

  # Self-hosted combined coverage badge (no external service): one coverage run over
  # all packages → an SVG published to an orphan 'badges' branch (README points at raw SVG).
  coverage-badge:
    needs: [test, decoupling-guard]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Combined coverage over all packages
        run: |
          python -m pip install --upgrade pip pytest pytest-cov "genbadge[coverage]"
          pip install "openwright-core>=0.6,<0.8" ./conformance
          for p in packages/*; do pip install -e "$p[test]" || pip install -e "$p"; done
          pytest packages/*/tests --cov=packages --cov-report=xml --cov-report=term-missing -q
          coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY" || true
          genbadge coverage -i coverage.xml -o coverage.svg
      - name: Publish badge to 'badges' branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan badges
          git add -f coverage.svg
          git commit -m "ci: update coverage badge"
          git push -f origin badges
